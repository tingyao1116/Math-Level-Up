<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數學小遊戲主頁</title>
  <style>
    :root {
      --bg1: #f0f9ff;
      --bg2: #eef2ff;
      --card: #ffffff;
      --text: #0f172a;
      --sub: #475569;
      --line: #dbe4ef;
      --brand: #0f766e;
      --brand-dark: #115e59;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(140deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 4vw, 40px); }
    .lead { margin: 0 0 20px; color: var(--sub); line-height: 1.8; }
    .section-title { margin: 0 0 12px; font-size: 22px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .card { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: #fff; }
    .card h3 { margin: 0 0 8px; font-size: 20px; }
    .card p { margin: 0 0 10px; line-height: 1.7; color: var(--sub); }
    .badge {
      display: inline-block; font-size: 13px; font-weight: 700; color: #0b3b37;
      background: #ccfbf1; border: 1px solid #99f6e4; border-radius: 999px; padding: 2px 10px; margin-bottom: 8px;
    }
    .btn {
      display: inline-block; text-decoration: none; color: #fff; background: var(--brand);
      border: 1px solid var(--brand); border-radius: 10px; padding: 8px 12px; font-weight: 700;
    }
    .btn:hover { background: var(--brand-dark); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>數學小遊戲主頁</h1>
    <p class="lead">這裡是你後續擴充遊戲的入口。每個遊戲獨立成一個副頁，主頁只負責導覽，方便老師上課快速切換。</p>

    <h2 class="section-title">遊戲入口</h2>
    <section class="grid">
      <article class="card">
        <div class="badge">已完成</div>
        <h3>記憶挑戰小遊戲</h3>
        <p>三種模式、可選起始關卡、失敗音效與驚嚇畫面。</p>
        <a class="btn" href="./memory-game.html">進入遊戲</a>
      </article>

      <article class="card">
        <div class="badge">已完成</div>
        <h3>3×3×3 立體三視圖</h3>
        <p>包含立體示意與前視圖、俯視圖、右視圖，適合課堂講解三視圖觀念。</p>
        <a class="btn" href="./three-view-3x3x3.html">開啟三視圖頁面</a>
      </article>
    </section>
  </main>
</body>
</html>
