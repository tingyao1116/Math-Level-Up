<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3x3 三視圖互動頁（Three.js）</title>
  <style>
    :root {
      --line: #cbd5e1;
      --text: #0f172a;
      --sub: #475569;
      --main: #0f766e;
      --bg: #f8fafc;
      --front: #0ea5e9;
      --right: #fde047;
      --top: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #ecfeff, #eef2ff);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 34px); }
    .lead { margin: 0 0 12px; line-height: 1.7; color: var(--sub); }
    .back {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 12px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      background: var(--main);
      font-weight: 800;
    }
    .layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    h2 { margin: 0 0 8px; font-size: 21px; }
    .control-grid { display: grid; grid-template-columns: repeat(3, minmax(62px, 84px)); gap: 8px; margin-bottom: 10px; }
    .pos-btn, .rotate-btn {
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: #f8fafc;
      cursor: pointer;
      font-weight: 800;
      font-family: inherit;
      padding: 7px 8px;
    }
    .rotate-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .legend-item { font-size: 13px; border: 1px solid #cbd5e1; border-radius: 999px; padding: 3px 9px; }
    .stage {
      border: 1px dashed #94a3b8;
      border-radius: 10px;
      background: var(--bg);
      min-height: 500px;
      position: relative;
      overflow: hidden;
    }
    #threeHost { width: 100%; height: 500px; }
    .views { display: grid; gap: 10px; }
    .view-title { margin: 0 0 4px; font-size: 15px; font-weight: 700; }
    .grid3 {
      width: 180px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .cell {
      aspect-ratio: 1;
      border: 1px solid #94a3b8;
      border-radius: 4px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .filled { background: #86efac; }
    .hint { margin-top: 10px; color: var(--sub); line-height: 1.7; font-size: 14px; }
    @media (max-width: 940px) {
      .layout { grid-template-columns: 1fr; }
      #threeHost { height: 420px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>3x3 三視圖互動頁（原點=1號最低點）</h1>
    <p class="lead">座標定義：前後為 x 軸、左右為 y 軸、上下為 z 軸，原點在 1 號位置最低點（左後下角）。</p>
    <a class="back" href="./index.html">回到主頁</a>

    <section class="layout">
      <article class="panel">
        <h2>高度控制與立體圖</h2>
        <div class="control-grid" id="controlGrid"></div>
        <div class="rotate-controls">
          <button class="rotate-btn" id="leftBtn">向左轉</button>
          <button class="rotate-btn" id="rightBtn">向右轉</button>
          <button class="rotate-btn" id="upBtn">向上轉</button>
          <button class="rotate-btn" id="downBtn">向下轉</button>
          <button class="rotate-btn" id="resetBtn">重設視角</button>
        </div>
        <div class="legend">
          <span class="legend-item">x+（前）藍軸</span>
          <span class="legend-item">y+（右）黃軸</span>
          <span class="legend-item">z+（上）綠軸</span>
        </div>
        <div class="stage"><div id="threeHost"></div></div>
      </article>

      <article class="panel">
        <h2>三視圖</h2>
        <div class="views">
          <div>
            <p class="view-title">前視圖（沿 x 看）</p>
            <div class="grid3" id="frontView"></div>
          </div>
          <div>
            <p class="view-title">俯視圖（沿 z 看）</p>
            <div class="grid3" id="topView"></div>
          </div>
          <div>
            <p class="view-title">右視圖（沿 y 看）</p>
            <div class="grid3" id="rightView"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>`r`n  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>`r`n  <script>`r`n    if (!window.THREE) {`r`n      document.getElementById("threeHost").innerHTML = "<div style=""padding:12px;color:#b91c1c;font-weight:700"">3D 套件載入失敗，請確認網路或改用本機伺服器。</div>";`r`n      throw new Error("THREE failed to load");`r`n    }`r`n`r`n    const heights = [`r`n      [3, 2, 1],`r`n      [2, 2, 1],`r`n      [1, 1, 1]`r`n    ];`r`n`r`n    const controlGrid = document.getElementById("controlGrid");`r`n    const frontView = document.getElementById("frontView");`r`n    const topView = document.getElementById("topView");`r`n    const rightView = document.getElementById("rightView");`r`n    const host = document.getElementById("threeHost");`r`n`r`n    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });`r`n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));`r`n    host.appendChild(renderer.domElement);`r`n`r`n    const scene = new THREE.Scene();`r`n    scene.background = new THREE.Color(0xf3f4f6);`r`n`r`n    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 1000);`r`n    camera.position.set(-10, -13, 10);`r`n    camera.up.set(0, 0, 1);`r`n`r`n    const controls = new THREE.OrbitControls(camera, renderer.domElement);`r`n    controls.enableDamping = true;`r`n    controls.target.set(3.2, 3.2, 2.2);`r`n`r`n    const lightA = new THREE.DirectionalLight(0xffffff, 0.95);`r`n    lightA.position.set(8, -10, 16);`r`n    scene.add(lightA);`r`n    scene.add(new THREE.AmbientLight(0xffffff, 0.45));`r`n`r`n    const originDot = new THREE.Mesh(`r`n      new THREE.SphereGeometry(0.14, 16, 16),`r`n      new THREE.MeshStandardMaterial({ color: 0x111827 })`r`n    );`r`n    originDot.position.set(0, 0, 0);`r`n    scene.add(originDot);`r`n`r`n    const axisLen = 8.2;`r`n    scene.add(new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0), axisLen, 0x0284c7, 0.5, 0.28));`r`n    scene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), axisLen, 0xf59e0b, 0.5, 0.28));`r`n    scene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 0), 6.5, 0x22c55e, 0.45, 0.24));`r`n`r`n    function labelSprite(text, color) {`r`n      const c = document.createElement("canvas");`r`n      c.width = 220; c.height = 70;`r`n      const g = c.getContext("2d");`r`n      g.clearRect(0, 0, c.width, c.height);`r`n      g.fillStyle = color || "#0f172a";`r`n      g.font = "bold 40px Noto Sans TC, Microsoft JhengHei, sans-serif";`r`n      g.fillText(text, 6, 48);`r`n      const tex = new THREE.CanvasTexture(c);`r`n      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });`r`n      const sp = new THREE.Sprite(mat);`r`n      sp.scale.set(2.8, 0.9, 1);`r`n      return sp;`r`n    }`r`n`r`n    const lx = labelSprite("x+（前）", "#0284c7"); lx.position.set(axisLen + 0.8, 0, 0.2); scene.add(lx);`r`n    const ly = labelSprite("y+（右）", "#b45309"); ly.position.set(0, axisLen + 0.8, 0.2); scene.add(ly);`r`n    const lz = labelSprite("z+（上）", "#15803d"); lz.position.set(0, 0, 7.2); scene.add(lz);`r`n    const lo = labelSprite("O（1號最低點）", "#111827"); lo.position.set(1.9, 0.5, 0.5); scene.add(lo);`r`n`r`n    const floor = new THREE.Group();`r`n    scene.add(floor);`r`n    for (let i = 0; i <= 3; i++) {`r`n      const mat = new THREE.LineBasicMaterial({ color: 0x9ca3af });`r`n      const g1 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i * 2, 0, 0), new THREE.Vector3(i * 2, 6, 0)]);`r`n      const g2 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, i * 2, 0), new THREE.Vector3(6, i * 2, 0)]);`r`n      floor.add(new THREE.Line(g1, mat));`r`n      floor.add(new THREE.Line(g2, mat));`r`n    }`r`n`r`n    const cubeGroup = new THREE.Group();`r`n    scene.add(cubeGroup);`r`n`r`n    const geo = new THREE.BoxGeometry(2, 2, 2);`r`n    const mats = [`r`n      new THREE.MeshStandardMaterial({ color: 0xfde047 }),`r`n      new THREE.MeshStandardMaterial({ color: 0xfde047 }),`r`n      new THREE.MeshStandardMaterial({ color: 0x22c55e }),`r`n      new THREE.MeshStandardMaterial({ color: 0x0284c7 }),`r`n      new THREE.MeshStandardMaterial({ color: 0xef4444 }),`r`n      new THREE.MeshStandardMaterial({ color: 0xb91c1c })`r`n    ];`r`n`r`n    function drawCells(target, fn) {`r`n      target.innerHTML = "";`r`n      for (let r = 0; r < 3; r++) {`r`n        for (let c = 0; c < 3; c++) {`r`n          const d = document.createElement("div");`r`n          d.className = "cell";`r`n          const v = fn(r, c);`r`n          if (v > 0) { d.classList.add("filled"); d.textContent = String(v); }`r`n          target.appendChild(d);`r`n        }`r`n      }`r`n    }`r`n`r`n    function renderViews() {`r`n      drawCells(frontView, (r, c) => {`r`n        const zNeed = 3 - r;`r`n        const y = c;`r`n        const h = Math.max(heights[0][y], heights[1][y], heights[2][y]);`r`n        return h >= zNeed ? 1 : 0;`r`n      });`r`n      drawCells(topView, (r, c) => (heights[r][c] > 0 ? 1 : 0));`r`n      drawCells(rightView, (r, c) => {`r`n        const zNeed = 3 - r;`r`n        const x = c;`r`n        const h = Math.max(heights[x][0], heights[x][1], heights[x][2]);`r`n        return h >= zNeed ? 1 : 0;`r`n      });`r`n    }`r`n`r`n    function renderCubes() {`r`n      while (cubeGroup.children.length) cubeGroup.remove(cubeGroup.children[0]);`r`n      for (let x = 0; x < 3; x++) {`r`n        for (let y = 0; y < 3; y++) {`r`n          const h = heights[x][y];`r`n          for (let z = 0; z < h; z++) {`r`n            const m = new THREE.Mesh(geo, mats);`r`n            m.position.set(x * 2 + 1, y * 2 + 1, z * 2 + 1);`r`n            cubeGroup.add(m);`r`n          }`r`n        }`r`n      }`r`n      renderViews();`r`n    }`r`n`r`n    function buildControls() {`r`n      controlGrid.innerHTML = "";`r`n      for (let x = 0; x < 3; x++) {`r`n        for (let y = 0; y < 3; y++) {`r`n          const n = x * 3 + y + 1;`r`n          const btn = document.createElement("button");`r`n          btn.className = "pos-btn";`r`n          btn.textContent = n + "：" + heights[x][y] + "層";`r`n          btn.addEventListener("click", () => {`r`n            heights[x][y] = heights[x][y] === 3 ? 0 : heights[x][y] + 1;`r`n            btn.textContent = n + "：" + heights[x][y] + "層";`r`n            renderCubes();`r`n          });`r`n          controlGrid.appendChild(btn);`r`n        }`r`n      }`r`n    }`r`n`r`n    function resize() {`r`n      const w = host.clientWidth;`r`n      const h = host.clientHeight;`r`n      renderer.setSize(w, h, false);`r`n      camera.aspect = w / h;`r`n      camera.updateProjectionMatrix();`r`n    }`r`n`r`n    function resetView() {`r`n      camera.position.set(-10, -13, 10);`r`n      controls.target.set(3.2, 3.2, 2.2);`r`n      controls.update();`r`n    }`r`n`r`n    document.getElementById("leftBtn").addEventListener("click", () => { scene.rotation.z += Math.PI / 12; });`r`n    document.getElementById("rightBtn").addEventListener("click", () => { scene.rotation.z -= Math.PI / 12; });`r`n    document.getElementById("upBtn").addEventListener("click", () => { camera.position.z += 1; });`r`n    document.getElementById("downBtn").addEventListener("click", () => { camera.position.z -= 1; });`r`n    document.getElementById("resetBtn").addEventListener("click", () => {`r`n      scene.rotation.set(0, 0, 0);`r`n      resetView();`r`n    });`r`n`r`n    window.addEventListener("resize", resize);`r`n`r`n    buildControls();`r`n    renderCubes();`r`n    resize();`r`n    resetView();`r`n`r`n    function tick() {`r`n      controls.update();`r`n      renderer.render(scene, camera);`r`n      requestAnimationFrame(tick);`r`n    }`r`n    tick();`r`n  </script>
</body>
</html>
