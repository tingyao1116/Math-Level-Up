<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3x3 三視圖互動頁（Three.js）</title>
  <style>
    :root {
      --line: #cbd5e1;
      --text: #0f172a;
      --sub: #475569;
      --main: #0f766e;
      --bg: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #ecfeff, #eef2ff);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 34px); }
    .lead { margin: 0 0 12px; line-height: 1.7; color: var(--sub); }
    .back {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 12px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      background: var(--main);
      font-weight: 800;
    }
    .layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    h2 { margin: 0 0 8px; font-size: 21px; }
    .control-grid { display: grid; grid-template-columns: repeat(3, minmax(62px, 84px)); gap: 8px; margin-bottom: 10px; }
    .pos-btn, .rotate-btn {
      border: 1px solid #94a3b8;
      border-radius: 10px;
      background: #f8fafc;
      cursor: pointer;
      font-weight: 800;
      font-family: inherit;
      padding: 7px 8px;
    }
    .rotate-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .legend-item { font-size: 13px; border: 1px solid #cbd5e1; border-radius: 999px; padding: 3px 9px; }
    .stage {
      border: 1px dashed #94a3b8;
      border-radius: 10px;
      background: var(--bg);
      min-height: 500px;
      position: relative;
      overflow: hidden;
    }
    #threeHost { width: 100%; height: 500px; }
    .views { display: grid; gap: 10px; }
    .view-title { margin: 0 0 4px; font-size: 15px; font-weight: 700; }
    .grid3 {
      width: 180px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .cell {
      aspect-ratio: 1;
      border: 1px solid #94a3b8;
      border-radius: 4px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .filled { background: #86efac; }
    @media (max-width: 940px) {
      .layout { grid-template-columns: 1fr; }
      #threeHost { height: 420px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>3x3 三視圖互動頁（原點=1號最低點）</h1>
    <p class="lead">座標定義：前後為 x 軸、左右為 y 軸、上下為 z 軸，原點在 1 號位置最低點（左後下角）。</p>
    <a class="back" href="./index.html">回到主頁</a>

    <section class="layout">
      <article class="panel">
        <h2>高度控制與立體圖</h2>
        <div class="control-grid" id="controlGrid"></div>
        <div class="rotate-controls">
          <button class="rotate-btn" id="leftBtn">向左轉</button>
          <button class="rotate-btn" id="rightBtn">向右轉</button>
          <button class="rotate-btn" id="upBtn">向上轉</button>
          <button class="rotate-btn" id="downBtn">向下轉</button>
          <button class="rotate-btn" id="resetBtn">重設視角</button>
        </div>
        <div class="legend">
          <span class="legend-item">x+（前）藍軸</span>
          <span class="legend-item">y+（右）黃軸</span>
          <span class="legend-item">z+（上）綠軸</span>
        </div>
        <div class="stage"><div id="threeHost"></div></div>
      </article>

      <article class="panel">
        <h2>三視圖</h2>
        <div class="views">
          <div>
            <p class="view-title">前視圖（沿 x 看）</p>
            <div class="grid3" id="frontView"></div>
          </div>
          <div>
            <p class="view-title">俯視圖（沿 z 看）</p>
            <div class="grid3" id="topView"></div>
          </div>
          <div>
            <p class="view-title">右視圖（沿 y 看）</p>
            <div class="grid3" id="rightView"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    if (!window.THREE) {
      document.getElementById("threeHost").innerHTML = '<div style="padding:12px;color:#b91c1c;font-weight:700">3D 套件載入失敗，請確認網路或改用本機伺服器。</div>';
      throw new Error("THREE failed to load");
    }

    const heights = [
      [3, 2, 1],
      [2, 2, 1],
      [1, 1, 1]
    ];

    const controlGrid = document.getElementById("controlGrid");
    const frontView = document.getElementById("frontView");
    const topView = document.getElementById("topView");
    const rightView = document.getElementById("rightView");
    const host = document.getElementById("threeHost");

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    host.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf3f4f6);

    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 1000);
    camera.position.set(-10, -13, 10);
    camera.up.set(0, 0, 1);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(3.2, 3.2, 2.2);

    const lightA = new THREE.DirectionalLight(0xffffff, 0.95);
    lightA.position.set(8, -10, 16);
    scene.add(lightA);
    scene.add(new THREE.AmbientLight(0xffffff, 0.45));

    const originDot = new THREE.Mesh(
      new THREE.SphereGeometry(0.14, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0x111827 })
    );
    originDot.position.set(0, 0, 0);
    scene.add(originDot);

    const axisLen = 8.2;
    scene.add(new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0), axisLen, 0x0284c7, 0.5, 0.28));
    scene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), axisLen, 0xf59e0b, 0.5, 0.28));
    scene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 0), 6.5, 0x22c55e, 0.45, 0.24));

    function labelSprite(text, color) {
      const c = document.createElement("canvas");
      c.width = 220; c.height = 70;
      const g = c.getContext("2d");
      g.clearRect(0, 0, c.width, c.height);
      g.fillStyle = color || "#0f172a";
      g.font = "bold 40px Noto Sans TC, Microsoft JhengHei, sans-serif";
      g.fillText(text, 6, 48);
      const tex = new THREE.CanvasTexture(c);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sp = new THREE.Sprite(mat);
      sp.scale.set(2.8, 0.9, 1);
      return sp;
    }

    const lx = labelSprite("x+（前）", "#0284c7"); lx.position.set(axisLen + 0.8, 0, 0.2); scene.add(lx);
    const ly = labelSprite("y+（右）", "#b45309"); ly.position.set(0, axisLen + 0.8, 0.2); scene.add(ly);
    const lz = labelSprite("z+（上）", "#15803d"); lz.position.set(0, 0, 7.2); scene.add(lz);
    const lo = labelSprite("O（1號最低點）", "#111827"); lo.position.set(1.9, 0.5, 0.5); scene.add(lo);

    const floor = new THREE.Group();
    scene.add(floor);
    for (let i = 0; i <= 3; i++) {
      const mat = new THREE.LineBasicMaterial({ color: 0x9ca3af });
      const g1 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i * 2, 0, 0), new THREE.Vector3(i * 2, 6, 0)]);
      const g2 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, i * 2, 0), new THREE.Vector3(6, i * 2, 0)]);
      floor.add(new THREE.Line(g1, mat));
      floor.add(new THREE.Line(g2, mat));
    }

    const cubeGroup = new THREE.Group();
    scene.add(cubeGroup);

    const geo = new THREE.BoxGeometry(2, 2, 2);
    const mats = [
      new THREE.MeshStandardMaterial({ color: 0xfde047 }),
      new THREE.MeshStandardMaterial({ color: 0xfde047 }),
      new THREE.MeshStandardMaterial({ color: 0x22c55e }),
      new THREE.MeshStandardMaterial({ color: 0x0284c7 }),
      new THREE.MeshStandardMaterial({ color: 0xef4444 }),
      new THREE.MeshStandardMaterial({ color: 0xb91c1c })
    ];

    function drawCells(target, fn) {
      target.innerHTML = "";
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const d = document.createElement("div");
          d.className = "cell";
          const v = fn(r, c);
          if (v > 0) {
            d.classList.add("filled");
            d.textContent = String(v);
          }
          target.appendChild(d);
        }
      }
    }

    function renderViews() {
      drawCells(frontView, function (r, c) {
        const zNeed = 3 - r;
        const y = c;
        const h = Math.max(heights[0][y], heights[1][y], heights[2][y]);
        return h >= zNeed ? 1 : 0;
      });
      drawCells(topView, function (r, c) {
        return heights[r][c] > 0 ? 1 : 0;
      });
      drawCells(rightView, function (r, c) {
        const zNeed = 3 - r;
        const x = c;
        const h = Math.max(heights[x][0], heights[x][1], heights[x][2]);
        return h >= zNeed ? 1 : 0;
      });
    }

    function renderCubes() {
      while (cubeGroup.children.length) cubeGroup.remove(cubeGroup.children[0]);
      for (let x = 0; x < 3; x++) {
        for (let y = 0; y < 3; y++) {
          const h = heights[x][y];
          for (let z = 0; z < h; z++) {
            const m = new THREE.Mesh(geo, mats);
            m.position.set(x * 2 + 1, y * 2 + 1, z * 2 + 1);
            cubeGroup.add(m);
          }
        }
      }
      renderViews();
    }

    function buildControls() {
      controlGrid.innerHTML = "";
      for (let x = 0; x < 3; x++) {
        for (let y = 0; y < 3; y++) {
          const n = x * 3 + y + 1;
          const btn = document.createElement("button");
          btn.className = "pos-btn";
          btn.textContent = n + "：" + heights[x][y] + "層";
          btn.addEventListener("click", function () {
            heights[x][y] = heights[x][y] === 3 ? 0 : heights[x][y] + 1;
            btn.textContent = n + "：" + heights[x][y] + "層";
            renderCubes();
          });
          controlGrid.appendChild(btn);
        }
      }
    }

    function resize() {
      const w = host.clientWidth;
      const h = host.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function resetView() {
      camera.position.set(-10, -13, 10);
      controls.target.set(3.2, 3.2, 2.2);
      controls.update();
    }

    document.getElementById("leftBtn").addEventListener("click", function () { scene.rotation.z += Math.PI / 12; });
    document.getElementById("rightBtn").addEventListener("click", function () { scene.rotation.z -= Math.PI / 12; });
    document.getElementById("upBtn").addEventListener("click", function () { camera.position.z += 1; });
    document.getElementById("downBtn").addEventListener("click", function () { camera.position.z -= 1; });
    document.getElementById("resetBtn").addEventListener("click", function () {
      scene.rotation.set(0, 0, 0);
      resetView();
    });

    window.addEventListener("resize", resize);

    buildControls();
    renderCubes();
    resize();
    resetView();

    function tick() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
